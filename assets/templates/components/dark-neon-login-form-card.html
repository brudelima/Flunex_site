<body>

    <html><head></head><body><main class="flex-1 z-10 flex flex-col sm:px-6 lg:px-8 px-6 py-16 relative justify-center">

          <div class="w-full bg-cyan-400/90 rounded-t-sm animate-pulse" style="height: 40%;"></div>
          <div class="w-full bg-cyan-400/90 rounded-t-sm animate-pulse" style="height: 85%; animation-delay: 0.2s;">
          </div>
          <div class="w-full bg-cyan-400/90 rounded-t-sm animate-pulse" style="height: 55%; animation-delay: 0.5s;">

        </div>
        <h2 class="text-2xl font-sans font-medium tracking-tight text-gray-100">Sign in to NovaPulse</h2>
        <p class="mt-2 text-xs text-cyan-600/80 uppercase tracking-widest font-sans">Welcome back to your creator hub
        </p>
      </div>

      <!-- Social Logins -->
      <div class="space-y-3 relative z-10">
        <button type="button" class="w-full py-3.5 px-5 rounded-xl flex items-center justify-center gap-3 group/btn transition-all duration-300 hover:bg-[#0a0a0c] cursor-pointer" style="background: #070708; box-shadow: inset 3px 3px 8px rgba(0,0,0,0.9);">

        <button type="button" class="w-full py-3.5 px-5 rounded-xl flex items-center justify-center gap-3 group/btn transition-all duration-300 hover:bg-[#0a0a0c] cursor-pointer" style="background: #070708; box-shadow: inset 3px 3px 8px rgba(0,0,0,0.9);">
            <iconify-icon icon="solar:apple-linear" class="text-cyan-600/80 text-lg group-hover/btn:text-cyan-400 transition-colors"></iconify-icon>

      <!-- Divider -->

      <!-- Email Form -->
      <form class="space-y-5 relative z-10" action="#" method="POST">

              password?</a>
          </div>
          <div class="mt-1 relative">
            <input id="password" name="password" type="password" autocomplete="current-password" required="" placeholder="••••••••" class="block w-full rounded-xl px-4 py-3.5 text-xs text-cyan-400 placeholder-cyan-900/50 focus:outline-none focus:ring-1 focus:ring-cyan-500/50 transition-colors font-sans tracking-widest pr-10" style="background: #070708; box-shadow: inset 3px 3px 8px rgba(0,0,0,0.9);">

                <span class="text-xs text-cyan-400 tracking-widest uppercase font-semibold group-hover/btn:text-cyan-300 transition-colors" style="text-shadow: 0 0 8px rgba(34,211,238,0.4);">Sign in</span>
                <iconify-icon icon="solar:alt-arrow-right-linear" class="text-cyan-500 text-lg group-hover/btn:translate-x-1 transition-transform"></iconify-icon>

      <!-- Sign Up Link -->
      <p class="mt-8 text-center text-xs text-gray-400/90 font-sans relative z-10 uppercase tracking-widest">
        Don't have an account?
        <a href="#" class="font-medium text-cyan-400 hover:text-cyan-300 transition-colors ml-1" style="text-shadow: 0 0 8px rgba(34,211,238,0.4);">Sign up</a>
      </p>
    </div>
  </div>
</main></body></html>
  </div>
  
    <script>
      (function() {
        function checkAndCenter() {
          // Use double requestAnimationFrame to ensure DOM is fully painted and layout is stable
          requestAnimationFrame(function() {
            requestAnimationFrame(function() {
              const wrapper = document.querySelector('.component-wrapper');
              if (!wrapper) return;
              
              // Get all child elements
              const children = Array.from(wrapper.children);
              if (children.length === 0) return;
              
              // Temporarily override wrapper styles to shrink-wrap for measurement
              // Set inline styles to shrink-wrap (inline styles override CSS)
              wrapper.style.display = 'inline-block';
              wrapper.style.width = 'auto';
              wrapper.style.height = 'auto';
              wrapper.style.overflow = 'visible';
              wrapper.style.boxSizing = 'content-box';
              
              // Force multiple reflows to ensure styles are fully applied
              void wrapper.offsetHeight;
              void wrapper.offsetWidth;
              void wrapper.offsetHeight;
              
              // Measure the wrapper's content size
              const contentWidth = wrapper.offsetWidth;
              const contentHeight = wrapper.offsetHeight;
              
              // Restore original styles by removing inline styles we added
              wrapper.style.removeProperty('display');
              wrapper.style.removeProperty('width');
              wrapper.style.removeProperty('height');
              wrapper.style.removeProperty('overflow');
              wrapper.style.removeProperty('box-sizing');
              
              // If content is less than 500x500, center it
              if (contentWidth > 0 && contentHeight > 0 && contentWidth < 500 && contentHeight < 500) {
                wrapper.style.display = 'flex';
                wrapper.style.alignItems = 'center';
                wrapper.style.justifyContent = 'center';
              }
            });
          });
        }
        
        // Check immediately and after delays to ensure content is rendered and styled
        function runChecks() {
          checkAndCenter();
          setTimeout(checkAndCenter, 50);
          setTimeout(checkAndCenter, 150);
          setTimeout(checkAndCenter, 300);
          setTimeout(checkAndCenter, 500);
          setTimeout(checkAndCenter, 1000);
        }
        
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', runChecks);
        } else {
          runChecks();
        }
        
        // Also check when images or other resources load
        window.addEventListener('load', () => {
          setTimeout(checkAndCenter, 100);
          setTimeout(checkAndCenter, 300);
        });
        
        // Use ResizeObserver to detect size changes
        if (window.ResizeObserver) {
          setTimeout(() => {
            const wrapper = document.querySelector('.component-wrapper');
            if (wrapper) {
              const observer = new ResizeObserver(() => {
                setTimeout(checkAndCenter, 50);
              });
              observer.observe(wrapper);
            }
          }, 500);
        }
      })();
    </script>
  
</body>
</html>
